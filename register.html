<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="register.css">
    <title>Document</title>
</head>
<body>
    <div class="form">
        <form action="" class="all">
            <label for="Fullname" class="Fullname">Fullname: </label>
            <input type="text" id="Fullname" placeholder="Your name" maxlength="20" required class="Fullname"><br><br>
            <label for="Password" class="password">Password: </label>
            <input type="password" id="Password" required maxlength="12" class="password"><br><br>
            <label for="confirmpassword" class="confirmpassword">Confirm Password: </label>
            <input type="password" class="password" required maxlength="12" class="confirmpassword"><br><br>
            <label for="Phone" class="Phone">Phone.no: </label>
            <input type="Phone" class="Phone" id="Phone" placeholder="1234567890" maxlength="10" required class="Phone"><br><br>
            <label for="Country" class="Country">Country</label>
            <input type="text" class="Country" placeholder="Optional" maxlength="20" class="Country"><br><br>
            <label for="Career" class="career">Career</label>
            <input type="text" class="career" placeholder="Optional. Just the name" maxlength="15" class="career"><br><br>
            <label for="Outside" class="Outside">Do you want to study aborad: </label><br><br>
            <label for="Yes">Yes</label>
            <input type="radio" name="C" checked="checked" class="check">
            <label for="No">No</label>
            <input type="radio" name="C" class="check"><br><br>
            <button class="Btn">Submit</button>
            <button class="Btn">Reset</button>
        </form>
    </div>
</body>
</html>
