<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Document</title>
</head>
<body>
    <a href="Home.html" class="Home">Go back</a><br>
    <div class="login">
        <form action="index.php" method="post">
            <div class="login-name">
                <label for="Username" class="head">Username: </label>
                <input type="text" name="Username" id="Username" placeholder="Username" maxlength="15" required class="search">
            </div><br>
            <div class="login-password">
                <label for="Password" class="head">Password: </label>
                <input type="password" id="Password" title="Max 12 charecters" maxlength="12" required class="search">
            </div><br>
            <div class="login-No">
                <label for="Number" class="head">Phone. No: </label>
                <input type="tel" id="Number" name="tel" placeholder="1234567890" maxlength="10" required class="search">
            </div><br>
            <div class="login-Country">
                <label for="Country" class="head">Country: </label>
                <input type="text" id="Country" placeholder="Optional" class="search">
            </div><br>
            <button type="submit" class="buttons">Submit</button>
            <button type="reset" class="buttons">Reset</button>
        </form>
    </div>
</body>
</html>
